[package]
name = "orb-camera-hmac-ca"
version = "0.0.0"
description = "CLI to talk to the orb-camera-hmac TA"
authors = ["Worldcoin"]
publish = false

edition = "2021"
license = "MIT OR (Apache-2.0 WITH LLVM-exception)"
repository = "https://github.com/worldcoin/orb-software"
rust-version = "1.91.1"

[features]
default = ["backend-optee"]
backend-optee = ["dep:optee-teec"]

[[bin]]
name = "orb-camera-hmac-ca"
required-features = ["backend-optee"]

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
color-eyre = "0.6.5"
eyre = "0.6.12"
optee-teec = { version = "0.7.0", optional = true }
rustix = { version = "0.38.37", features = ["process"] }
serde_json = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing = "0.1"

[dependencies.orb-camera-hmac-proto]
branch = "lauren/camera-hmac"
git = "https://github.com/worldcoin/orb-rustzone.git"

[package.metadata.orb]
unsupported_targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]

[package.metadata.deb]
assets = [["target/release/orb-camera-hmac-ca", "/usr/local/bin/", "755"]]
