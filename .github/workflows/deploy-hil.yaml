name: Deploy to HIL Machines

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target machine to deploy, "orbs" (pearl/diamond HILs), "mini" (orb-mini HILs), or "all"'
        required: true

env:
  ORBS_TARGETS: '["worldcoin-hil-munich-0","worldcoin-hil-munich-2","worldcoin-hil-munich-3","worldcoin-hil-munich-4","worldcoin-hil-munich-5", "worldcoin-hil-munich-6","worldcoin-hil-munich-8","worldcoin-hil-munich-9","worldcoin-hil-munich-10","worldcoin-hil-munich-11"]'
  MINI_TARGETS: '["worldcoin-hil-munich-1","worldcoin-hil-sf-1"]'

jobs:
  prepare:
    name: Prepare deployment matrix
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Determine targets
        id: targets
        run: |
          case "${{ inputs.target }}" in
            all)
              targets="$(jq -c -n --argjson a "$ORBS_TARGETS" --argjson b "$MINI_TARGETS" '$a + $b')"
              ;;
            orbs)
              targets="$ORBS_TARGETS"
              ;;
            mini)
              targets="$MINI_TARGETS"
              ;;
            *)
              targets="[\"${{ inputs.target }}\"]"
              ;;
          esac
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.target }}
    needs: prepare
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
      fail-fast: false
    runs-on: [self-hosted, nixos, "${{ matrix.target }}"]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # pin@v3
        with:
          token: ${{ secrets.ORB_GIT_HUB_TOKEN }}

      - name: Configure Nix GitHub auth
        env:
          NIX_GITHUB_ACCESS_TOKEN: ${{ secrets.ORB_GIT_HUB_TOKEN }}
        run: |
          set -Eeuo pipefail

          if [ -z "${NIX_GITHUB_ACCESS_TOKEN}" ]; then
            echo "::error::ORB_GIT_HUB_TOKEN is required for Nix to fetch private GitHub flake inputs"
            exit 1
          fi

          auth_conf="${RUNNER_TEMP}/nix-github-access.conf"
          install -m 600 /dev/null "${auth_conf}"
          printf 'access-tokens = github.com=%s\n' "${NIX_GITHUB_ACCESS_TOKEN}" > "${auth_conf}"

          if [ -n "${NIX_USER_CONF_FILES:-}" ]; then
            echo "NIX_USER_CONF_FILES=${auth_conf}:${NIX_USER_CONF_FILES}" >> "${GITHUB_ENV}"
          else
            echo "NIX_USER_CONF_FILES=${auth_conf}" >> "${GITHUB_ENV}"
          fi
          echo "NIX_GITHUB_AUTH_CONF=${auth_conf}" >> "${GITHUB_ENV}"

      - name: Update nixpkgs-unstable
        run: nix flake update nixpkgs-unstable

      - name: Deploy
        run: sudo env "NIX_USER_CONF_FILES=${NIX_USER_CONF_FILES}" nixos-rebuild switch --flake .

      - name: Clean up Nix GitHub auth
        if: always()
        run: |
          set -Eeuo pipefail

          if [ -n "${NIX_GITHUB_AUTH_CONF:-}" ]; then
            rm -f "${NIX_GITHUB_AUTH_CONF}"
          fi

      - name: Write orb-software commit file
        run: |
          sudo install -d -m 755 /etc/worldcoin
          printf '%s\n' "${{ github.sha }}" | sudo tee /etc/worldcoin/orb-software.commit > /dev/null
          sudo chmod 644 /etc/worldcoin/orb-software.commit
          echo "orb-software commit: ${{ github.sha }}"

      - name: Restart orb-hil-agent
        run: sudo systemctl restart orb-hil-agent.service

      - name: Write orb-hil version file
        run: |
          version="$(grep -oP '(?<=version = ")[^"]+' nix/packages/orb-hil.nix)"
          sudo install -d -m 755 /etc/worldcoin
          printf '%s\n' "${version}" | sudo tee /etc/worldcoin/orb-hil.version > /dev/null
          sudo chmod 644 /etc/worldcoin/orb-hil.version
          echo "orb-hil version: ${version}"

      - name: Install HIL SSH key
        env:
          HIL_SSH_PRIVATE_KEY: ${{ secrets.HIL_PRIVATE_SSH_KEY }}
          HIL_SSH_SYSTEM_KEY_PATH: /etc/worldcoin/secrets/hil-ssh-key
        run: |
          set -Eeuo pipefail

          tmp_key="$(mktemp)"
          trap 'rm -f "${tmp_key}"' EXIT
          printf '%s\n' "${HIL_SSH_PRIVATE_KEY}" > "${tmp_key}"

          sudo install -d -m 750 -o root -g wheel "$(dirname "${HIL_SSH_SYSTEM_KEY_PATH}")"
          if ! sudo test -f "${HIL_SSH_SYSTEM_KEY_PATH}" || ! sudo cmp -s "${tmp_key}" "${HIL_SSH_SYSTEM_KEY_PATH}"; then
            sudo install -m 640 -o root -g wheel "${tmp_key}" "${HIL_SSH_SYSTEM_KEY_PATH}"
          else
            sudo chown root:wheel "${HIL_SSH_SYSTEM_KEY_PATH}"
            sudo chmod 640 "${HIL_SSH_SYSTEM_KEY_PATH}"
          fi

      - name: Install HIL SSH key for users
        env:
          HIL_SSH_PRIVATE_KEY: ${{ secrets.HIL_PRIVATE_SSH_KEY }}
        run: |
          set -Eeuo pipefail

          tmp_key="$(mktemp)"
          trap 'rm -f "${tmp_key}"' EXIT
          printf '%s\n' "${HIL_SSH_PRIVATE_KEY}" > "${tmp_key}"

          for user in worldcoin gh-runner-user; do
            home="$(getent passwd "${user}" | cut -d: -f6)"
            ssh_dir="${home}/.ssh"
            key_path="${ssh_dir}/id_ed25519"
            sudo install -d -m 700 -o "${user}" -g users "${ssh_dir}"
            if ! sudo test -f "${key_path}" || ! sudo cmp -s "${tmp_key}" "${key_path}"; then
              sudo install -m 600 -o "${user}" -g users "${tmp_key}" "${key_path}"
            else
              sudo chown "${user}:users" "${key_path}"
              sudo chmod 600 "${key_path}"
            fi
          done

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Target**: ${{ matrix.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
