name: Deploy to HIL Machines

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target machine to deploy, or "all"'
        required: true

env:
  ALL_TARGETS: '["worldcoin-hil-munich-0","worldcoin-hil-munich-2","worldcoin-hil-munich-3","worldcoin-hil-munich-5","worldcoin-hil-munich-8","worldcoin-hil-munich-9","worldcoin-hil-munich-10","worldcoin-hil-munich-11"]'

jobs:
  prepare:
    name: Prepare deployment matrix
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Determine targets
        id: targets
        run: |
          if [ "${{ inputs.target }}" = "all" ]; then
            echo "targets=$ALL_TARGETS" >> "$GITHUB_OUTPUT"
          else
            echo "targets=[\"${{ inputs.target }}\"]" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.target }}
    needs: prepare
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
      fail-fast: false
    runs-on: [self-hosted, nixos, "${{ matrix.target }}"]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # pin@v3
        with:
          token: ${{ secrets.ORB_GIT_HUB_TOKEN }}

      - name: Deploy
        run: sudo nixos-rebuild switch --flake .

      - name: Write orb-hil version file
        run: |
          version="$(grep -oP '(?<=version = ")[^"]+' nix/packages/orb-hil.nix)"
          sudo install -d -m 755 /etc/worldcoin
          printf '%s\n' "${version}" | sudo tee /etc/worldcoin/orb-hil.version > /dev/null
          sudo chmod 644 /etc/worldcoin/orb-hil.version
          echo "orb-hil version: ${version}"

      - name: Install HIL SSH key
        env:
          HIL_SSH_PRIVATE_KEY: ${{ secrets.HIL_PRIVATE_SSH_KEY }}
          HIL_SSH_SYSTEM_KEY_PATH: /etc/worldcoin/secrets/hil-ssh-key
        run: |
          set -Eeuo pipefail

          tmp_key="$(mktemp)"
          trap 'rm -f "${tmp_key}"' EXIT
          printf '%s\n' "${HIL_SSH_PRIVATE_KEY}" > "${tmp_key}"

          sudo install -d -m 750 -o root -g wheel "$(dirname "${HIL_SSH_SYSTEM_KEY_PATH}")"
          if ! sudo test -f "${HIL_SSH_SYSTEM_KEY_PATH}" || ! sudo cmp -s "${tmp_key}" "${HIL_SSH_SYSTEM_KEY_PATH}"; then
            sudo install -m 640 -o root -g wheel "${tmp_key}" "${HIL_SSH_SYSTEM_KEY_PATH}"
          else
            sudo chown root:wheel "${HIL_SSH_SYSTEM_KEY_PATH}"
            sudo chmod 640 "${HIL_SSH_SYSTEM_KEY_PATH}"
          fi

      - name: Install HIL SSH key for users
        env:
          HIL_SSH_PRIVATE_KEY: ${{ secrets.HIL_PRIVATE_SSH_KEY }}
        run: |
          set -Eeuo pipefail

          tmp_key="$(mktemp)"
          trap 'rm -f "${tmp_key}"' EXIT
          printf '%s\n' "${HIL_SSH_PRIVATE_KEY}" > "${tmp_key}"

          for user in worldcoin gh-runner-user; do
            home="$(getent passwd "${user}" | cut -d: -f6)"
            ssh_dir="${home}/.ssh"
            key_path="${ssh_dir}/id_ed25519"
            sudo install -d -m 700 -o "${user}" -g users "${ssh_dir}"
            if ! sudo test -f "${key_path}" || ! sudo cmp -s "${tmp_key}" "${key_path}"; then
              sudo install -m 600 -o "${user}" -g users "${tmp_key}" "${key_path}"
            else
              sudo chown "${user}:users" "${key_path}"
              sudo chmod 600 "${key_path}"
            fi
          done

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Target**: ${{ matrix.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
