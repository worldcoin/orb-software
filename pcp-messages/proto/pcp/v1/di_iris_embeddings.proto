syntax = "proto3";

package pcp.v1;

message DiIrisEmbeddings {
  DiIrisEmbeddingV1 embedding_v1 = 1;
}

message DiIrisEmbeddingV1 {
  string model_version = 1;
  string embedding_inference_backend = 2;
  string embedding_version = 3;

  string left_embedding = 4;
  string left_mirror_embedding = 5;
  string right_embedding = 6;
  string right_mirror_embedding = 7;

  string left_embedding_f32 = 8;
  string left_mirror_embedding_f32 = 9;
  string right_embedding_f32 = 10;
  string right_mirror_embedding_f32 = 11;
}
